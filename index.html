<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ScoreBoard Overlay</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            color: white;
            font-family: Arial, sans-serif;
        }
        .overlay {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .score-board {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 3rem;
            font-weight: bold;
        }
        .team {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
        }
        .score {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 5px;
        }
        .timer {
            font-size: 2.5rem;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="score-board">
            <div class="team">Команда 1</div>
            <div class="score" id="score">0 : 0</div>
            <div class="team">Команда 2</div>
        </div>
        <div class="timer" id="timer">00:00</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
