<div class="control-panel">
    <h2>Панель управления оверлеем</h2>
    
    <div>
        <h3>Счёт</h3>
        <button onclick="updateScore('team1', 1)">+1 Команда 1</button>
        <button onclick="updateScore('team2', 1)">+1 Команда 2</button>
    </div>
    
    <div>
        <h3>Таймер</h3>
        <button onclick="startTimer()">Старт</button>
        <button onclick="resetTimer(10)">Сброс на 10 мин</button>
        <button onclick="resetTimer(20)">Сброс на 20 мин</button>
    </div>
</div>

<script src="script.js"></script>
